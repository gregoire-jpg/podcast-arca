name: Sync YouTube → Dropbox

on:
  schedule:
    - cron: "0 6,12,18,0 * * *"   # 4× par jour
  workflow_dispatch:
    inputs:
      init:
        description: "Import initial (toutes les vidéos de toutes les playlists)"
        required: false
        default: "false"
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Pour commit + push de episodes.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Installer dépendances Python
        run: pip install yt-dlp dropbox

      - name: Synchronisation
        env:
          DROPBOX_APP_KEY:       ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET:    ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.init }}" = "true" ]; then
            python scripts/sync.py --init
          else
            python scripts/sync.py
          fi

      - name: Commit episodes.json si modifié
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes.json
          git diff --staged --quiet \
            || git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
