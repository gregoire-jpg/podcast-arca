[build]
  command = "node build-rss.js"
  publish = "."

# RSS feed
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

# episodes.json accessible depuis arca-revue.com
[[headers]]
  for = "/episodes.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "https://arca-revue.com"

# config.json accessible depuis arca-revue.com
[[headers]]
  for = "/config.json"
  [headers.values]
    Access-Control-Allow-Origin = "https://arca-revue.com"

# embed.html : autoriser l'intégration depuis arca-revue.com
[[headers]]
  for = "/embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"
