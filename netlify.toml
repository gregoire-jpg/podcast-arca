[build]
  command = "node build-rss.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# RSS
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

# JSON accessible depuis arca-revue.com et l'admin
[[headers]]
  for = "/episodes.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/config.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# embed.html : autoriser l'intégration depuis arca-revue.com
[[headers]]
  for = "/embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# documents.json accessible publiquement
[[headers]]
  for = "/documents.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# docs.html accessible depuis arca-revue.com
[[headers]]
  for = "/docs.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# docs-embed.html intégrable depuis arca-revue.com
[[headers]]
  for = "/docs-embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# glossaire.json public
[[headers]]
  for = "/glossaire.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# glossaire.html intégrable
[[headers]]
  for = "/glossaire.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"
