[build]
  command = "node build-rss.js"
  publish = "."
  functions = "netlify/functions"

# Fichiers HTML : jamais mis en cache (toujours la version la plus recente)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Page racine
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# RSS
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

# JSON accessible depuis arca-revue.com et l'admin
[[headers]]
  for = "/episodes.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/config.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# embed.html : autoriser l'intégration depuis arca-revue.com
[[headers]]
  for = "/embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# documents.json accessible publiquement
[[headers]]
  for = "/documents.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# docs.html accessible depuis arca-revue.com
[[headers]]
  for = "/docs.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# docs-embed.html intégrable depuis arca-revue.com
[[headers]]
  for = "/docs-embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# glossaire.json public
[[headers]]
  for = "/glossaire.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# glossaire.html intégrable
[[headers]]
  for = "/glossaire.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"

# dictionnaire.json public
[[headers]]
  for = "/dictionnaire.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# Force redeploy 2026-05-04T10:30:00Z
