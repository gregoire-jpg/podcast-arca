[build]
  command = "node build-rss.js"
  publish = "."
  functions = "netlify/functions"

# RSS
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

# JSON accessible depuis arca-revue.com et l'admin
[[headers]]
  for = "/episodes.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/config.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# embed.html : autoriser l'intégration depuis arca-revue.com
[[headers]]
  for = "/embed.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://arca-revue.com"
