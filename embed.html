<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcasts — Revue ARCA</title>
  <!-- v2 -->
  <style>
    :root {
      --navy:    #2d3461;
      --navy-dk: #1e2245;
      --gold:    #c8a060;
      --white:   #ffffff;
      --bg:      #faf8f5;
      --border:  #e2ddd8;
      --muted:   #777;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: auto; }
    body { font-family: Georgia, serif; background: var(--bg); color: var(--navy); }
    button { cursor: pointer; }

    /* ── Filter bar ── */
    .pa-filter-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 90;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .pa-filter-tabs { display: flex; justify-content: center; }
    .pa-tab {
      padding: 15px 35px;
      font: .7em/1 Arial, sans-serif;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted);
      background: none; border: none;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .pa-tab:hover { color: var(--navy); }
    .pa-tab.active { color: var(--navy); border-bottom-color: var(--gold); font-weight: 700; }

    /* ── Sub-filters ── */
    .pa-sub {
      background: #f3f0ea;
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      text-align: center;
      display: none;
    }
    .pa-sub.on { display: block; }
    .pa-sub-label {
      display: block;
      font: .65em/1 Arial, sans-serif;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .pa-chip {
      display: inline-block; margin: 3px;
      padding: 5px 16px;
      border: 1px solid var(--navy); border-radius: 20px;
      font: .85em/1 Georgia, serif; color: var(--navy);
      background: var(--white);
      transition: background .18s, color .18s;
    }
    .pa-chip:hover, .pa-chip.active { background: var(--navy); color: var(--white); }

    /* ── Player ── */
    .pa-player { background: var(--navy); padding: 22px 24px 18px; display: none; }
    .pa-player.on { display: block; }
    .pa-player-inner { max-width: 820px; margin: 0 auto; }
    .pa-ep-info { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 18px; }
    .pa-ep-thumb {
      width: 70px; height: 70px; border-radius: 6px;
      object-fit: cover; flex-shrink: 0; background: var(--navy-dk);
    }
    .pa-ep-thumb-ph {
      width: 70px; height: 70px; border-radius: 6px; flex-shrink: 0;
      background: var(--navy-dk);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6em; color: rgba(255,255,255,.2);
    }
    .pa-ep-meta { flex: 1; min-width: 0; }
    .pa-ep-title {
      font: normal 1.05em/1.35 Georgia, serif; color: var(--white);
      margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pa-ep-author { font: .78em/1 Arial, sans-serif; color: var(--gold); margin-bottom: 3px; }
    .pa-ep-playlist { font: italic .78em/1 Georgia, serif; color: rgba(255,255,255,.45); }

    .pa-progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .pa-time { font: .72em/1 Arial, sans-serif; color: rgba(255,255,255,.5); min-width: 36px; }
    .pa-time.end { text-align: right; }
    .pa-progress-track {
      flex: 1; height: 4px; background: rgba(255,255,255,.15);
      border-radius: 2px; position: relative; cursor: pointer;
    }
    .pa-progress-fill {
      height: 100%; background: var(--gold); border-radius: 2px;
      width: 0%; pointer-events: none;
    }
    .pa-progress-thumb {
      position: absolute; top: 50%; left: 0;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--gold); transform: translateY(-50%);
      opacity: 0; transition: opacity .15s; pointer-events: none;
    }
    .pa-progress-track:hover .pa-progress-thumb { opacity: 1; }

    .pa-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .pa-btn {
      background: none; border: none; color: rgba(255,255,255,.7);
      font-size: 1em; padding: 5px 7px;
      transition: color .15s, transform .1s;
    }
    .pa-btn:hover { color: var(--white); transform: scale(1.1); }
    .pa-btn-play {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--gold); border: none; color: var(--navy);
      font-size: 1.1em; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    .pa-btn-play:hover { transform: scale(1.06); }
    .pa-speed {
      background: rgba(255,255,255,.1); border: none; border-radius: 4px;
      color: rgba(255,255,255,.6); padding: 3px 7px;
      font: .72em/1 Arial, sans-serif; cursor: pointer; margin-left: 6px;
    }

    /* ── Playlist card grid (aligne avec les cartes articles) ── */
    .pa-playlist-grid { max-width: 860px; margin: 0 auto; padding: 20px; display: none; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 16px; }
    .pa-pl-card { background: var(--white); border-radius: 10px; overflow: hidden; cursor: pointer; border: 2px solid transparent; box-shadow: 0 2px 8px rgba(45,52,97,.08); transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; }
    .pa-pl-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(45,52,97,.16); }
    .pa-pl-thumb { width: 100%; height: 140px; object-fit: cover; background: var(--navy); display: block; }
    .pa-pl-body { padding: 14px; flex: 1; }
    /* Compteur d'écoutes */
    .pa-play-count { font: .68em/1 Arial; color: var(--gold); font-weight: bold; display: inline-block; margin-left: 6px; opacity: .85; }
    .pa-row-count { font: .68em/1 Arial; color: var(--gold); white-space: nowrap; flex-shrink: 0; margin-left: 4px; }
    .pa-pl-name { font: normal .88em/1.3 Georgia, serif; color: var(--navy); margin-bottom: 4px; }
    .pa-pl-info { font: .68em/1.4 Arial, sans-serif; color: var(--muted); }
    .pa-pl-count { color: var(--gold); font-weight: bold; }

    /* Bannière Nouveautés */
    .pa-featured-card { grid-column:1/-1; background:var(--white); border-radius:10px; overflow:hidden; cursor:pointer; border:3px solid var(--gold); box-shadow:0 2px 8px rgba(45,52,97,.08); transition:transform .2s,box-shadow .2s; }
    .pa-featured-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(45,52,97,.16); }
    .pa-featured-thumbs { display:grid; grid-template-columns:repeat(5,1fr); gap:2px; overflow:hidden; }
    .pa-featured-thumbs img, .pa-featured-thumbs .pa-featured-ph { width:100%; aspect-ratio:16/9; object-fit:cover; object-position:center; display:block; }
    .pa-featured-ph { background:var(--navy); }
    .pa-featured-body { padding:12px 14px 14px; }
    .pa-featured-badge { display:inline-block; background:var(--gold); color:var(--navy-dk); font:bold .6em/1 Arial,sans-serif; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:4px; margin-bottom:6px; }
    .pa-featured-title { font:normal .92em/1.35 Georgia,serif; color:var(--navy); margin-bottom:3px; }
    .pa-featured-info { font:.68em/1.4 Arial,sans-serif; color:var(--muted); }
    .pa-featured-count { color:var(--gold); font-weight:bold; }

    .pa-back-btn { display: inline-block; margin-bottom: 12px; background: none; border: none; color: var(--muted); font: .78em/1 Arial, sans-serif; cursor: pointer; padding: 0; }
    .pa-back-btn:hover { color: var(--navy); }
    .pa-chip-count { opacity: .6; font-size: .85em; }

    /* ── Episode list ── */
    .pa-list { max-width: 820px; margin: 0 auto; padding: 0 20px 40px; }

    .pa-group-header {
      padding: 40px 0 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .pa-group-num {
      font: .62em/1 Arial, sans-serif;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); display: block; margin-bottom: 8px;
    }
    .pa-group-title {
      font: normal 1.5em/1.2 Georgia, serif; color: var(--navy); margin-bottom: 5px;
    }
    .pa-group-sub { font: italic .85em/1 Georgia, serif; color: var(--muted); }
    .pa-group-rule { width: 24px; height: 1px; background: var(--gold); margin-top: 12px; opacity: .5; }

    .pa-ep-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 10px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .15s;
      border-radius: 4px; margin: 0 -10px;
    }
    .pa-ep-row:hover { background: rgba(45,52,97,.05); }
    .pa-ep-row.playing { background: rgba(45,52,97,.08); }
    .pa-row-num { font: .68em/1 Arial, sans-serif; color: var(--muted); min-width: 20px; text-align: center; }
    .pa-row-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .pa-row-info { flex: 1; min-width: 0; }
    .pa-row-title {
      font: .94em/1.35 Georgia, serif; color: var(--navy);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .pa-row-meta { font: .7em/1 Arial, sans-serif; color: var(--muted); }
    .pa-row-dur { font: .72em/1 Arial, sans-serif; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .pa-row-play-icon { font-size: .82em; color: var(--gold); flex-shrink: 0; width: 14px; text-align: center; }

    .pa-state {
      text-align: center; padding: 60px 20px;
      font: italic 1em/1.6 Georgia, serif; color: var(--muted);
    }

    @media (max-width: 600px) {
      .pa-tab { padding: 13px 14px; font-size: .62em; }
      .pa-player { padding: 16px 14px 14px; }
    }

    /* Bandeau */
    .pa-header { background: var(--navy); padding: 48px 24px 40px; text-align: center; }
    .pa-eyebrow { display: block; font: .65em/1 Arial; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .pa-header h1 { font: normal 2.4em/1 Georgia; letter-spacing: 5px; text-transform: uppercase; color: #fff; margin-bottom: 16px; }
    .pa-rule { width: 44px; height: 2px; background: var(--gold); margin: 0 auto 16px; }
    .pa-header p { font: italic 1em/1 Georgia; color: rgba(255,255,255,.55); }
    .pa-stat{margin-top:12px;display:inline-flex;align-items:center;gap:8px;
      padding:5px 16px;border:1px solid rgba(200,160,96,.4);border-radius:20px;
      font:.68em/1 Arial;letter-spacing:2px;text-transform:uppercase;
      color:var(--gold);opacity:.9;}
    .pa-stat-num{font-weight:bold;font-size:1.15em;letter-spacing:1px;}

    /* Bouton retour en haut */
    #btn-top { position: fixed; bottom: 24px; right: 20px; z-index: 200;
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--gold); color: #fff; font-size: 1.2em; line-height: 42px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.25);
      opacity: 0.25; transform: scale(0.85);
      transition: opacity .2s, transform .2s; }
    #btn-top:hover, #btn-top.visible { opacity: 1; transform: scale(1); }

    @media (max-width: 600px) {
      .pa-header h1 { font-size: 1.8em; }
    }
  </style>
</head>
<body>

<!-- Bandeau -->
<div class="pa-header">
  <span class="pa-eyebrow">Revue ARCA</span>
  <h1>Podcasts</h1>
  <div class="pa-rule"></div>
  <p id="pod-eps">— épisodes · Philosophie · Hermétisme · Alchimie</p>
  <div class="pa-stat" id="pod-stat" style="display:none">
    <span class="pa-stat-num" id="pod-count">0</span> écoutes
  </div>
</div>

<!-- ── Filter bar ── -->
<div class="pa-filter-bar">
  <div class="pa-filter-tabs">
    <button class="pa-tab active" data-view="playlist">Par Playlist</button>
    <button class="pa-tab"        data-view="auteur">Par Auteur</button>
    <button class="pa-tab"        data-view="sujet">Par Sujet</button>
  </div>
</div>

<div class="pa-sub" id="sub-auteur">
  <span class="pa-sub-label">Choisir un auteur</span>
  <button class="pa-chip active" data-type="auteur" data-val="tous">Tous</button>
</div>
<div class="pa-sub" id="sub-sujet">
  <span class="pa-sub-label">Choisir un sujet</span>
  <button class="pa-chip active" data-type="sujet" data-val="tous">Tous</button>
</div>

<!-- ── Player ── -->
<div class="pa-player" id="pa-player">
  <div class="pa-player-inner">
    <div class="pa-ep-info">
      <div class="pa-ep-thumb-ph" id="pa-thumb-ph">♪</div>
      <img class="pa-ep-thumb" id="pa-thumb" src="" alt="" style="display:none">
      <div class="pa-ep-meta">
        <div class="pa-ep-title"   id="pa-ep-title">—</div>
        <div class="pa-ep-author"  id="pa-ep-author"></div>
        <div class="pa-ep-playlist" id="pa-ep-pl"></div>
      </div>
    </div>
    <div class="pa-progress-row">
      <span class="pa-time" id="pa-cur">0:00</span>
      <div class="pa-progress-track" id="pa-track">
        <div class="pa-progress-fill"  id="pa-fill"></div>
        <div class="pa-progress-thumb" id="pa-thumb-dot"></div>
      </div>
      <span class="pa-time end" id="pa-dur">0:00</span>
    </div>
    <div class="pa-controls">
      <button class="pa-btn" id="btn-prev">⏮</button>
      <button class="pa-btn" id="btn-back">↩15</button>
      <button class="pa-btn-play" id="btn-play">▶</button>
      <button class="pa-btn" id="btn-fwd">15↪</button>
      <button class="pa-btn" id="btn-next">⏭</button>
      <select class="pa-speed" id="pa-speed">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>
</div>

<!-- ── Playlist card grid ── -->
<div class="pa-playlist-grid" id="pa-playlist-grid"></div>

<!-- ── Episode list ── -->
<div class="pa-list" id="pa-list">
  <div class="pa-state">Chargement des épisodes…</div>
</div>

<audio id="pa-audio" preload="metadata"></audio>

<script>
(function () {
  var S = { episodes: [], config: {}, idx: -1, view: "playlist", filter: "grid" };
  var audio   = document.getElementById("pa-audio");
  var $ = function (id) { return document.getElementById(id); };
  var list    = $("pa-list");
  var plGrid  = $("pa-playlist-grid");
  var player  = $("pa-player");
  var fill    = $("pa-fill");
  var track   = $("pa-track");
  var btnPlay = $("btn-play");

  /* Auto-resize : notifie la hauteur au parent (site ARCA) */
  function notifyHeight() {
    // Mesurer le contenu réel (pas scrollHeight qui ne rétrécit pas)
    var h = document.body.getBoundingClientRect().height ||
            document.documentElement.offsetHeight;
    window.parent.postMessage({ type: "pa-resize", height: Math.ceil(h) + 20 }, "https://arca-revue.com");
  }

  function init() {
    Promise.all([
      fetch("https://podcast-arca.netlify.app/episodes.json").then(function (r) { return r.json(); }),
      fetch("https://podcast-arca.netlify.app/config.json").then(function (r)   { return r.json(); })
    ]).then(function (res) {
      S.episodes = res[0];
      S.config   = res[1];
      var epsEl = document.getElementById('pod-eps');
      if (epsEl) epsEl.textContent = S.episodes.length + ' épisodes · Philosophie · Hermétisme · Alchimie';
      // Charger les compteurs d'écoutes
      fetch('https://podcast-arca.netlify.app/counts.json?' + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(c){
          S.counts = c;
          var tot = c.totals && c.totals.plays > 0 ? c.totals.plays : 0;
          var statEl = document.getElementById('pod-stat');
          var cntEl  = document.getElementById('pod-count');
          if (tot > 0 && statEl && cntEl) {
            cntEl.textContent = tot.toLocaleString('fr-FR');
            statEl.style.display = 'inline-flex';
          }
          render(); // Re-render avec compteurs
        }).catch(function(){});
      buildSubFilters();
      render();
      setTimeout(notifyHeight, 300);
    }).catch(function () {
      list.innerHTML = '<div class="pa-state">Impossible de charger les épisodes.</div>';
      notifyHeight();
    });

    document.querySelectorAll(".pa-tab").forEach(function (tab) {
      tab.addEventListener("click", function () {
        S.view   = this.dataset.view;
        S.filter = S.view === "playlist" ? "grid" : "tous";
        document.querySelectorAll(".pa-tab").forEach(function (t) { t.classList.remove("active"); });
        this.classList.add("active");
        $("sub-auteur").classList.toggle("on", S.view === "auteur");
        $("sub-sujet").classList.toggle("on",  S.view === "sujet");
        ["auteur","sujet"].forEach(function (type) {
          var btns = document.querySelectorAll("#sub-" + type + " .pa-chip");
          btns.forEach(function (b) { b.classList.remove("active"); });
          if (btns[0]) btns[0].classList.add("active");
        });
        render();
        setTimeout(notifyHeight, 100);
      });
    });

    ["sub-auteur","sub-sujet"].forEach(function (id) {
      $(id).addEventListener("click", function (e) {
        var chip = e.target.closest(".pa-chip");
        if (!chip) return;
        S.filter = chip.dataset.val;
        $(id).querySelectorAll(".pa-chip").forEach(function (c) { c.classList.remove("active"); });
        chip.classList.add("active");
        render();
        setTimeout(notifyHeight, 100);
      });
    });

    btnPlay.addEventListener("click", togglePlay);
    $("btn-prev").addEventListener("click", function () { jumpEp(-1); });
    $("btn-next").addEventListener("click", function () { jumpEp(+1); });
    $("btn-back").addEventListener("click", function () { audio.currentTime -= 15; });
    $("btn-fwd").addEventListener("click",  function () { audio.currentTime += 15; });
    $("pa-speed").addEventListener("change", function () { audio.playbackRate = parseFloat(this.value); });
    track.addEventListener("click", function (e) {
      if (!audio.duration) return;
      var rect = track.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });
    audio.addEventListener("timeupdate",     updateProgress);
    audio.addEventListener("loadedmetadata", function () { $("pa-dur").textContent = fmtTime(audio.duration); notifyHeight(); });
    audio.addEventListener("play",  function () { btnPlay.textContent = "⏸"; });
    audio.addEventListener("pause", function () { btnPlay.textContent = "▶"; });
    audio.addEventListener("ended", function () { jumpEp(+1); });
  }

  function buildSubFilters() {
    var cfg = S.config;
    var authorCounts = {}, subjectCounts = {};
    S.episodes.forEach(function (ep) {
      (ep.authors || []).forEach(function (a) { authorCounts[a] = (authorCounts[a] || 0) + 1; });
      if (ep.subject) subjectCounts[ep.subject] = (subjectCounts[ep.subject] || 0) + 1;
    });
    var aHtml = '<span class="pa-sub-label">Choisir un auteur</span><button class="pa-chip active" data-type="auteur" data-val="tous">Tous <span class="pa-chip-count">(' + S.episodes.length + ')</span></button>';
    Object.keys(cfg.authors || {}).forEach(function (key) {
      var c = authorCounts[key] || 0; if (!c) return;
      aHtml += '<button class="pa-chip" data-type="auteur" data-val="' + key + '">' + cfg.authors[key] + ' <span class="pa-chip-count">(' + c + ')</span></button>';
    });
    $("sub-auteur").innerHTML = aHtml;
    var sHtml = '<span class="pa-sub-label">Choisir un sujet</span><button class="pa-chip active" data-type="sujet" data-val="tous">Tous <span class="pa-chip-count">(' + S.episodes.length + ')</span></button>';
    Object.keys(cfg.subjects || {}).forEach(function (key) {
      var c = subjectCounts[key] || 0; if (!c) return;
      sHtml += '<button class="pa-chip" data-type="sujet" data-val="' + key + '">' + cfg.subjects[key] + ' <span class="pa-chip-count">(' + c + ')</span></button>';
    });
    $("sub-sujet").innerHTML = sHtml;
  }

  function visible() {
    if (S.view === "playlist") {
      if (S.filter === "grid")   return [];
      if (S.filter === "recent") return S.episodes.slice(0, 5);
      if (S.filter === "tous")   return S.episodes;
      return S.episodes.filter(function (ep) { return ep.playlist_slug === S.filter; }).slice().reverse();
    }
    if (S.filter === "tous") return S.episodes;
    if (S.view === "auteur") return S.episodes.filter(function (ep) { return (ep.authors || []).indexOf(S.filter) !== -1; });
    return S.episodes.filter(function (ep) { return ep.subject === S.filter; });
  }

  function render() {
    var showGrid = S.view === "playlist" && S.filter === "grid";
    plGrid.style.display = showGrid ? "grid"  : "none";
    list.style.display   = showGrid ? "none"  : "block";
    if (showGrid) { renderPlaylistGrid(); notifyHeight(); return; }

    var eps = visible();
    if (!eps.length) { list.innerHTML = '<div class="pa-state">Aucun épisode pour cette sélection.</div>'; notifyHeight(); return; }
    var html = "", headerTitle = "", headerSub = "", backBtn = "";

    if (S.view === "playlist" && S.filter === "recent") {
      headerTitle = "★ Derniers épisodes"; headerSub = "Les 5 dernières publications";
      backBtn = '<button class="pa-back-btn" id="pa-back">← Toutes les playlists</button>';
    } else if (S.view === "playlist" && S.filter !== "tous") {
      var f = eps[0];
      if (f) { headerTitle = f.playlist_title; var al = (f.authors||[]).map(function(a){return(S.config.authors||{})[a]||a;}).join(" · "); headerSub = al?"par "+al:""; }
      backBtn = '<button class="pa-back-btn" id="pa-back">← Toutes les playlists</button>';
    } else if (S.view === "playlist" && S.filter === "tous") {
      var groups = {}, order = [];
      eps.forEach(function(ep){ var s=ep.playlist_slug||"default"; if(!groups[s]){groups[s]=[];order.push(s);}groups[s].push(ep); });
      var roman=["I","II","III","IV","V","VI","VII","VIII","IX","X"];
      order.forEach(function(slug,gi){ var gr=groups[slug].slice().reverse(),fi=gr[0]; var al2=(fi.authors||[]).map(function(a){return(S.config.authors||{})[a]||a;}).join(" · ");
        html+='<div class="pa-group-header"><span class="pa-group-num">Playlist '+(roman[gi]||gi+1)+'</span><div class="pa-group-title">'+esc(fi.playlist_title)+'</div>'+(al2?'<div class="pa-group-sub">par '+esc(al2)+'</div>':'')+'<div class="pa-group-rule"></div></div>';
        gr.forEach(function(ep,i){html+=epRow(ep,i+1);});
      });
      list.innerHTML=html; highlightPlaying();
      list.querySelectorAll(".pa-ep-row").forEach(function(row){row.addEventListener("click",function(){playEp(parseInt(this.dataset.idx,10));});});
      notifyHeight(); return;
    } else if (S.filter !== "tous") {
      headerTitle = S.view === "auteur" ? ((S.config.authors||{})[S.filter]||S.filter) : ((S.config.subjects||{})[S.filter]||S.filter);
    }

    if (backBtn||headerTitle) {
      html+='<div class="pa-group-header">'+backBtn+(headerTitle?'<div class="pa-group-title">'+esc(headerTitle)+'</div>':'')+(headerSub?'<div class="pa-group-sub">'+esc(headerSub)+'</div>':'')+'<div class="pa-group-rule"></div></div>';
    }
    eps.forEach(function(ep,i){html+=epRow(ep,i+1);});
    list.innerHTML=html; highlightPlaying();
    var backEl=document.getElementById("pa-back");
    if(backEl) backEl.addEventListener("click",function(){S.filter="grid";render();});
    list.querySelectorAll(".pa-ep-row").forEach(function(row){row.addEventListener("click",function(){playEp(parseInt(this.dataset.idx,10));});});
    notifyHeight();
  }

  function renderPlaylistGrid() {
    var seen={},counts={},playlists=[];
    S.episodes.forEach(function(ep){ if(!seen[ep.playlist_slug]){seen[ep.playlist_slug]=true;playlists.push({slug:ep.playlist_slug,title:ep.playlist_title,ep:ep});}counts[ep.playlist_slug]=(counts[ep.playlist_slug]||0)+1; });

    var recent5=S.episodes.slice(0,5);
    var collage=recent5.slice(0,4).map(function(ep){return ep.image_url?'<img src="'+esc(ep.image_url)+'" alt="" loading="lazy">':'<div class="pa-featured-ph"></div>';}).join("");
    var thumbs=recent5.map(function(ep){
      return ep.image_url?'<img src="'+esc(ep.image_url)+'" alt="" loading="lazy">':'<div class="pa-featured-ph"></div>';
    }).join("");

    var html='<div class="pa-featured-card" data-slug="recent">'+
      '<div class="pa-featured-thumbs">'+thumbs+'</div>'+
      '<div class="pa-featured-body">'+
        '<div class="pa-featured-badge">★ Nouveautés</div>'+
        '<div class="pa-featured-title">Derniers épisodes</div>'+
        '<div class="pa-featured-info"><span class="pa-featured-count">5 derniers épisodes</span> — toutes playlists</div>'+
      '</div></div>';

    playlists.forEach(function(pl){
      var count=counts[pl.slug]||0;
      var authors=(pl.ep.authors||[]).map(function(a){return(S.config.authors||{})[a]||a;}).join(", ");
      var thumb=pl.ep.image_url?'<img class="pa-pl-thumb" src="'+esc(pl.ep.image_url)+'" alt="" loading="lazy">':'<div class="pa-pl-thumb"></div>';
      html+='<div class="pa-pl-card" data-slug="'+esc(pl.slug)+'">'+thumb+'<div class="pa-pl-body"><div class="pa-pl-name">'+esc(pl.title)+'</div><div class="pa-pl-info"><span class="pa-pl-count">'+count+' épisode'+(count>1?'s':'')+'</span>'+(authors?' · '+esc(authors):'')+'</div></div></div>';
    });

    plGrid.innerHTML=html;
    plGrid.querySelectorAll(".pa-featured-card,.pa-pl-card").forEach(function(card){card.addEventListener("click",function(){S.filter=this.dataset.slug;render();});});
    notifyHeight();
  }

  function epRow(ep, num) {
    var idx = S.episodes.indexOf(ep);
    var authors = (ep.authors || []).map(function (a) { return (S.config.authors || {})[a] || a; }).join(", ");
    var isPlaying = (idx === S.idx);
    var thumb = ep.image_url
      ? '<img class="pa-row-thumb" src="' + esc(ep.image_url) + '" alt="" loading="lazy">'
      : '<div class="pa-row-thumb" style="background:#e2ddd8;border-radius:4px;"></div>';
    var epKey = ep.youtube_id || ep.id || '';
    var plays = S.counts && S.counts.plays && epKey ? (S.counts.plays[epKey] || 0) : 0;
    var playsHtml = plays > 0 ? '<span class="pa-row-count">▶ ' + plays + '</span>' : '';
    return '<div class="pa-ep-row' + (isPlaying ? ' playing' : '') + '" data-idx="' + idx + '">' +
      '<div class="pa-row-play-icon">' + (isPlaying ? '▶' : '') + '</div>' +
      '<div class="pa-row-num">' + num + '</div>' + thumb +
      '<div class="pa-row-info"><div class="pa-row-title">' + esc(ep.title) + '</div>' +
      '<div class="pa-row-meta">' + esc(authors) + (ep.playlist_title && S.view !== "playlist" ? ' · ' + esc(ep.playlist_title) : '') + '</div></div>' +
      playsHtml +
      '<div class="pa-row-dur">' + esc(ep.duration_fmt || "") + '</div></div>';
  }

  function highlightPlaying() {
    list.querySelectorAll(".pa-ep-row").forEach(function (row) {
      var active = parseInt(row.dataset.idx, 10) === S.idx;
      row.classList.toggle("playing", active);
      row.querySelector(".pa-row-play-icon").textContent = active ? "▶" : "";
    });
  }

  function playEp(idx) {
    if (idx < 0 || idx >= S.episodes.length) return;
    var ep = S.episodes[idx];
    if (!ep.audio_url) return;
    S.idx = idx;
    audio.src = ep.audio_url;
    audio.playbackRate = parseFloat($("pa-speed").value);
    audio.play();
    var epKey = ep.youtube_id || ep.id || '';
    if (epKey) {
      fetch('/.netlify/functions/track-count', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({type:'play', id: epKey})
      }).then(function(r){ return r.json(); }).then(function(d){
        if (!S.counts) S.counts = {downloads:{},plays:{},totals:{downloads:0,plays:0}};
        S.counts.plays[epKey] = d.count || 0;
        S.counts.totals.plays = d.total || 0;
        // Mettre à jour le badge du bandeau
        var statEl = document.getElementById('pod-stat');
        var cntEl  = document.getElementById('pod-count');
        if (cntEl && d.total > 0) {
          cntEl.textContent = d.total.toLocaleString('fr-FR');
          if (statEl) statEl.style.display = 'inline-flex';
        }
        render(); // Rafraîchir le compteur dans la ligne de l'épisode
      }).catch(function(){});
    }
    $("pa-ep-title").textContent  = ep.title || "—";
    $("pa-ep-author").textContent = (ep.authors || []).map(function (a) { return (S.config.authors || {})[a] || a; }).join(" · ");
    $("pa-ep-pl").textContent     = ep.playlist_title || "";
    if (ep.image_url) {
      $("pa-thumb").src = ep.image_url; $("pa-thumb").style.display = "block"; $("pa-thumb-ph").style.display = "none";
    } else {
      $("pa-thumb").style.display = "none"; $("pa-thumb-ph").style.display = "flex";
    }
    player.classList.add("on");
    updateProgress();
    highlightPlaying();
    setTimeout(notifyHeight, 200);
  }

  function togglePlay() { if (!audio.src) return; audio.paused ? audio.play() : audio.pause(); }

  function jumpEp(delta) {
    var eps = visible();
    var cur = eps.find(function (e) { return S.episodes.indexOf(e) === S.idx; });
    var ci  = cur ? eps.indexOf(cur) : -1;
    var next = eps[ci + delta];
    if (next) playEp(S.episodes.indexOf(next));
  }

  function updateProgress() {
    if (!audio.duration) return;
    var pct = (audio.currentTime / audio.duration) * 100;
    fill.style.width = pct + "%";
    $("pa-thumb-dot").style.left = "calc(" + pct + "% - 5px)";
    $("pa-cur").textContent = fmtTime(audio.currentTime);
  }

  function fmtTime(s) {
    if (isNaN(s) || !s) return "0:00";
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h) return h + ":" + pad(m) + ":" + pad(sec);
    return m + ":" + pad(sec);
  }
  function pad(n) { return n < 10 ? "0" + n : String(n); }
  function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", init); } else { init(); }
})();
</script>

<button id="btn-top" title="Retour en haut" aria-label="Retour en haut">↑</button>
<script>
(function(){
  var btn = document.getElementById('btn-top');
  function onScroll() { btn.classList.toggle('visible', (window.scrollY||document.documentElement.scrollTop||0) > 150); }
  window.addEventListener('scroll', onScroll, {passive:true});
  document.addEventListener('scroll', onScroll, {passive:true});
  btn.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });
})();
</script>
