<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation — Revue ARCA</title>
  <style>
    :root {
      --navy:#2d3461; --navy-dk:#1e2245; --gold:#c8a060;
      --white:#ffffff; --bg:#faf8f5; --border:#e2ddd8; --muted:#777;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,serif;background:var(--bg);color:var(--navy);}
    button{cursor:pointer;}

    .pa-filter-bar{background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .pa-filter-tabs{display:flex;justify-content:center;}
    .pa-tab{padding:14px 28px;font:.7em/1 Arial;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;}
    .pa-tab:hover{color:var(--navy);}
    .pa-tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700;}

    .pa-sub{background:#f3f0ea;border-bottom:1px solid var(--border);padding:14px 18px;text-align:center;display:none;}
    .pa-sub.on{display:block;}
    .pa-sub-label{display:block;font:.65em/1 Arial;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
    .pa-chip{display:inline-block;margin:3px;padding:5px 14px;border:1px solid var(--navy);border-radius:20px;font:.83em/1 Georgia;color:var(--navy);background:var(--white);transition:background .18s,color .18s;cursor:pointer;}
    .pa-chip:hover,.pa-chip.active{background:var(--navy);color:var(--white);}
    .pa-chip-count{opacity:.6;font-size:.85em;}

    .pa-container{max-width:860px;margin:0 auto;padding:20px 20px 60px;}

    .section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;}
    @media(min-width:768px){.section-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px;}}
    .section-card{background:var(--white);border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;box-shadow:0 2px 8px rgba(45,52,97,.08);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
    .section-card:hover{transform:translateY(-4px);box-shadow:0 8px 22px rgba(45,52,97,.16);}
    .sc-icon{background:var(--navy);padding:22px;text-align:center;font-size:2em;}
    .sc-img{height:140px;overflow:hidden;background:var(--navy);}
    .sc-img img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform .4s;}
    .section-card:hover .sc-img img{transform:scale(1.06);}
    .cat-img{height:90px;margin:-14px -14px 10px;overflow:hidden;border-radius:8px 8px 0 0;background:var(--navy);}
    .cat-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
    .cat-card:hover .cat-img img{transform:scale(1.07);}
    .sc-body{padding:14px;flex:1;}
    .sc-title{font:normal .95em/1.3 Georgia;color:var(--navy);margin-bottom:5px;}
    .sc-count{font:.7em/1 Arial;color:var(--gold);font-weight:bold;}
    .sc-desc{font:italic .72em/1.4 Arial;color:var(--muted);margin-top:3px;}

    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
    @media(min-width:768px){.cat-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}}
    .cat-card{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:14px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;}
    .cat-card:hover{transform:translateY(-3px);box-shadow:0 5px 14px rgba(45,52,97,.12);border-color:var(--gold);}
    .cat-card-title{font:normal .9em/1.3 Georgia;color:var(--navy);margin-bottom:4px;}
    .cat-card-count{font:.7em/1 Arial;color:var(--gold);font-weight:bold;}

    .breadcrumb{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
    .bc-btn{background:none;border:none;font:.76em/1 Arial;color:var(--muted);padding:0;transition:color .2s;}
    .bc-btn:hover{color:var(--navy);}
    .bc-sep{color:var(--border);font-size:.78em;}
    .bc-current{font:.76em/1 Arial;color:var(--navy);}

    .doc-list{margin-top:4px;}
    .doc-row{display:flex;align-items:flex-start;gap:12px;padding:12px 8px;border-bottom:1px solid var(--border);border-radius:4px;margin:0 -8px;transition:background .15s;}
    .doc-row:hover{background:rgba(45,52,97,.04);}
    .doc-icon{font-size:1em;color:var(--gold);flex-shrink:0;width:20px;text-align:center;margin-top:2px;}
    .doc-body{flex:1;min-width:0;}
    .doc-title{font:.93em/1.35 Georgia;color:var(--navy);margin-bottom:2px;}
    .doc-meta{font:.7em/1 Arial;color:var(--muted);}
    .doc-dl{display:inline-flex;align-items:center;gap:4px;font:.7em/1 Arial;color:var(--gold);text-decoration:none;flex-shrink:0;white-space:nowrap;padding:3px 9px;border:1px solid var(--gold);border-radius:4px;transition:background .15s,color .15s;}
    .doc-dl:hover{background:var(--gold);color:var(--navy);}
    .doc-dl-soon{opacity:.3;font:.68em/1 Arial;color:var(--muted);flex-shrink:0;}
    .doc-dl-count{font:.65em/1 Arial;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-left:4px;}

    .pa-state{text-align:center;padding:60px 20px;font:italic 1em/1.6 Georgia;color:var(--muted);}

    @media(max-width:540px){.pa-tab{padding:12px 14px;font-size:.62em;}.pa-container{padding:14px 12px 50px;}}

    /* Bandeau */
    .pa-header{background:var(--navy);padding:48px 24px 40px;text-align:center;}
    .pa-eyebrow{display:block;font:.65em/1 Arial;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
    .pa-header h1{font:normal 2.4em/1 Georgia;letter-spacing:5px;text-transform:uppercase;color:#fff;margin-bottom:16px;}
    .pa-rule{width:44px;height:2px;background:var(--gold);margin:0 auto 16px;}
    .pa-header p{font:italic 1em/1 Georgia;color:rgba(255,255,255,.55);}
    .pa-stat{margin-top:12px;display:inline-flex;align-items:center;gap:8px;
      padding:5px 16px;border:1px solid rgba(200,160,96,.4);border-radius:20px;
      font:.68em/1 Arial;letter-spacing:2px;text-transform:uppercase;
      color:var(--gold);opacity:.9;}
    .pa-stat-num{font-weight:bold;font-size:1.15em;letter-spacing:1px;}

    /* Bouton retour en haut */
    #btn-top{position:fixed;bottom:24px;right:20px;z-index:200;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;background:var(--gold);color:#fff;font-size:1.2em;line-height:42px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25);opacity:.25;transform:scale(.85);transition:opacity .2s,transform .2s;}
    #btn-top:hover,#btn-top.visible{opacity:1;transform:scale(1);}

    @media(max-width:540px){.pa-header h1{font-size:1.8em;}}
  </style>
</head>
<body>

<!-- Bandeau -->
<div class="pa-header">
  <span class="pa-eyebrow">Revue ARCA</span>
  <h1>Documentation</h1>
  <div class="pa-rule"></div>
  <p>Articles · Livres · Revues · Lectures</p>
  <div class="pa-stat" id="docs-stat" style="display:none">
    <span class="pa-stat-num" id="docs-count">0</span> téléchargements
  </div>
</div>

<div class="pa-filter-bar">
  <div class="pa-filter-tabs">
    <button class="pa-tab active" data-view="browse">Parcourir</button>
    <button class="pa-tab"        data-view="auteur">Par Auteur</button>
    <button class="pa-tab"        data-view="sujet">Par Sujet</button>
  </div>
</div>

<div class="pa-sub" id="sub-auteur"></div>
<div class="pa-sub" id="sub-sujet"></div>

<div class="pa-container" id="pa-main"><div class="pa-state">Chargement…</div></div>

<script>
(function(){
  var D={docs:[],view:'browse',filter:'tous',level:'home',section:'',category:''};
  var $=function(id){return document.getElementById(id);};
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function notifyHeight(){window.parent.postMessage({type:'pa-docs-resize',height:document.body.scrollHeight},'https://arca-revue.com');}

  var IMGS={
    'revue':         'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/HermesTrismegistusCaucHighRes.jpg/600px-HermesTrismegistusCaucHighRes.jpg',
    'articles':      'https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Cistercian_monks_at_work_-_UL_Cambridge_Ms_Mm.5.31.jpg/600px-Cistercian_monks_at_work_-_UL_Cambridge_Ms_Mm.5.31.jpg',
    'livres':        'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/KellsFol034rChiRhoMonogram.jpg/600px-KellsFol034rChiRhoMonogram.jpg',
    'lus-pour-vous': 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Folio_26r_-_The_Annunciation.jpg/600px-Folio_26r_-_The_Annunciation.jpg',
    'Alchimie':      'https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/A_crowned_alchemical_flask_containing_a_young_king%2C_dressed_Wellcome_V0025640.jpg/400px-A_crowned_alchemical_flask_containing_a_young_king%2C_dressed_Wellcome_V0025640.jpg',
    'Hermétisme':    'https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Emerald_Tablet_British_Library_Arundel_MS_164_fol_155r.jpg/400px-Emerald_Tablet_British_Library_Arundel_MS_164_fol_155r.jpg',
    'Christianisme': 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Folio_26r_-_The_Annunciation.jpg/400px-Folio_26r_-_The_Annunciation.jpg',
    'Classiques':    'https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Sinuhe-Papyrus_%28Papyrus_Berlin_3022%29.jpg/400px-Sinuhe-Papyrus_%28Papyrus_Berlin_3022%29.jpg',
    'Louis Cattiaux & Message Retrouvé':'https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/A_peacock_in_a_crowned_alchemical_flask%3B_representing_the_st_Wellcome_V0025638.jpg/400px-A_peacock_in_a_crowned_alchemical_flask%3B_representing_the_st_Wellcome_V0025638.jpg',
    'Judaïsme':      'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Medieval_amulet_to_protect_mother_and_child._Wellcome_M0008070.jpg/400px-Medieval_amulet_to_protect_mother_and_child._Wellcome_M0008070.jpg',
    'Islam':         'https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Illuminated_frontispiece_from_the_Ilkhanid_Qur%27an_manuscript.jpg/400px-Illuminated_frontispiece_from_the_Ilkhanid_Qur%27an_manuscript.jpg',
    'Divers':        'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Voynich_Manuscript_%2832%29.jpg/400px-Voynich_Manuscript_%2832%29.jpg',
    'Néophytes':     'https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Cistercian_monks_at_work_-_UL_Cambridge_Ms_Mm.5.31.jpg/400px-Cistercian_monks_at_work_-_UL_Cambridge_Ms_Mm.5.31.jpg',
    'Néerlandais':   'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/KellsFol034rChiRhoMonogram.jpg/400px-KellsFol034rChiRhoMonogram.jpg',
    'Égypte':        'https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Sinuhe-Papyrus_%28Papyrus_Berlin_3022%29.jpg/400px-Sinuhe-Papyrus_%28Papyrus_Berlin_3022%29.jpg',
  };

  function cardImg(key,fb){var s=IMGS[key]||'';if(!s)return'<div class="sc-icon">'+fb+'</div>';return'<div class="sc-img"><img src="'+s+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\''+fb+'\'"></div>';}

  var SECTIONS=[
    {id:'revue',        label:'Revue ARCA',   icon:'📰',desc:'Les numéros complets de la revue'},
    {id:'articles',     label:'Articles',      icon:'📄',desc:'Articles classés par thème'},
    {id:'livres',       label:'Livres',        icon:'📖',desc:'Ouvrages hermétiques et philosophiques'},
    {id:'lus-pour-vous',label:'Lus pour vous', icon:'👁',desc:'Lectures commentées'},
  ];

  function init(){
    Promise.all([
      fetch('https://podcast-arca.netlify.app/documents.json?'+Date.now()).then(function(r){return r.json();}),
      fetch('https://podcast-arca.netlify.app/docs-images.json?'+Date.now()).then(function(r){return r.json();}).catch(function(){return{};})
    ]).then(function(all){var r=all[0],img=all[1];
      if(img.sections) Object.assign(IMGS,img.sections);
      if(img.categories) Object.assign(IMGS,img.categories);
      D.docs=r;
      // Charger les compteurs de téléchargements
      fetch('https://podcast-arca.netlify.app/counts.json?'+Date.now())
        .then(function(res){return res.json();})
        .then(function(c){
          D.counts=c;
          var tot=c.totals&&c.totals.downloads>0?c.totals.downloads:0;
          var statEl=document.getElementById('docs-stat');
          var cntEl=document.getElementById('docs-count');
          if(tot>0&&statEl&&cntEl){
            cntEl.textContent=tot.toLocaleString('fr-FR');
            statEl.style.display='inline-flex';
          }
          render();
        }).catch(function(){});
      buildSubFilters(); render(); setTimeout(notifyHeight,300);
    }).catch(function(){$('pa-main').innerHTML='<div class="pa-state">Impossible de charger la documentation.</div>';});

    document.querySelectorAll('.pa-tab').forEach(function(tab){
      tab.addEventListener('click',function(){
        D.view=this.dataset.view;D.filter='tous';D.level='home';D.section='';D.category='';
        document.querySelectorAll('.pa-tab').forEach(function(t){t.classList.remove('active');});
        this.classList.add('active');
        $('sub-auteur').classList.toggle('on',D.view==='auteur');
        $('sub-sujet').classList.toggle('on',D.view==='sujet');
        resetChips();render();setTimeout(notifyHeight,100);
      });
    });
    ['sub-auteur','sub-sujet'].forEach(function(id){
      $(id).addEventListener('click',function(e){
        var chip=e.target.closest('.pa-chip');if(!chip)return;
        D.filter=chip.dataset.val;
        $(id).querySelectorAll('.pa-chip').forEach(function(c){c.classList.remove('active');});
        chip.classList.add('active');render();setTimeout(notifyHeight,100);
      });
    });
  }

  function resetChips(){
    ['sub-auteur','sub-sujet'].forEach(function(id){
      var btns=$(id).querySelectorAll('.pa-chip');
      btns.forEach(function(b){b.classList.remove('active');});
      if(btns[0])btns[0].classList.add('active');
    });
  }

  function buildSubFilters(){
    var ac={},sc={},total=D.docs.length;
    D.docs.forEach(function(d){
      if(d.subject)sc[d.subject]=(sc[d.subject]||0)+1;
      (d.authors||[]).forEach(function(a){ac[a]=(ac[a]||0)+1;});
    });
    function chips(map,type){
      var h='<span class="pa-sub-label">Choisir '+(type==='auteur'?'un auteur':'un sujet')+'</span>'+
        '<button class="pa-chip active" data-type="'+type+'" data-val="tous">Tous <span class="pa-chip-count">('+total+')</span></button>';
      Object.keys(map).sort().forEach(function(k){if(map[k])h+='<button class="pa-chip" data-type="'+type+'" data-val="'+esc(k)+'">'+esc(k)+' <span class="pa-chip-count">('+map[k]+')</span></button>';});
      return h;
    }
    $('sub-auteur').innerHTML=chips(ac,'auteur');
    $('sub-sujet').innerHTML=chips(sc,'sujet');
  }

  function render(){
    var main=$('pa-main');
    if(D.view!=='browse'){renderFlat(main);return;}
    if(D.level==='home')    {renderHome(main);return;}
    if(D.level==='section') {renderSection(main);return;}
    if(D.level==='category'){renderDocs(main);return;}
  }

  function renderHome(main){
    var counts={};D.docs.forEach(function(d){counts[d.type]=(counts[d.type]||0)+1;});
    var h='<div class="section-grid">';
    SECTIONS.forEach(function(s){
      h+='<div class="section-card" data-section="'+s.id+'">'+
        cardImg(s.id,s.icon)+
        '<div class="sc-body"><div class="sc-title">'+esc(s.label)+'</div>'+
        '<div class="sc-count">'+(counts[s.id]||0)+' document(s)</div>'+
        '<div class="sc-desc">'+esc(s.desc)+'</div></div></div>';
    });
    main.innerHTML=h+'</div>';
    main.querySelectorAll('.section-card').forEach(function(c){
      c.addEventListener('click',function(){
        D.section=this.dataset.section;
        D.level=(D.section==='articles'||D.section==='lus-pour-vous')?'section':'category';
        render();setTimeout(notifyHeight,100);
      });
    });
  }

  function renderSection(main){
    var sd=D.docs.filter(function(d){return d.type===D.section||d.type===D.section.replace(/s$/,'');});
    var cats={},order=[];
    sd.forEach(function(d){if(!cats[d.category]){cats[d.category]=0;order.push(d.category);}cats[d.category]++;});
    var sl=(SECTIONS.find(function(s){return s.id===D.section;})||{}).label||D.section;
    var h=bc([{label:'Accueil',target:'home'},{label:sl}])+'<div class="cat-grid">';
    order.forEach(function(cat){
      var ci=IMGS[cat]?'<div class="cat-img"><img src="'+IMGS[cat]+'" alt="" loading="lazy" onerror="this.parentElement.remove()"></div>':'';
      h+='<div class="cat-card" data-cat="'+esc(cat)+'">'+ci+
        '<div class="cat-card-title">'+esc(cat)+'</div>'+
        '<div class="cat-card-count">'+cats[cat]+' document(s)</div></div>';
    });
    main.innerHTML=h+'</div>';
    main.querySelectorAll('.bc-btn').forEach(attachBc);
    main.querySelectorAll('.cat-card').forEach(function(c){
      c.addEventListener('click',function(){D.category=this.dataset.cat;D.level='category';render();setTimeout(notifyHeight,100);});
    });
  }

  function renderDocs(main){
    var docs=D.docs.filter(function(d){
      var tMatch=d.type===D.section||d.type===D.section.replace(/s$/,'');
      if(!tMatch)return false;
      if((D.section==='articles'||D.section==='lus-pour-vous')&&d.category!==D.category)return false;
      return true;
    });
    var sl=(SECTIONS.find(function(s){return s.id===D.section;})||{}).label||D.section;
    var crumbs=[{label:'Accueil',target:'home'}];
    if(D.section==='article'||D.section==='lus-pour-vous'){crumbs.push({label:sl,target:'section'});crumbs.push({label:D.category});}
    else{crumbs.push({label:sl});}
    var h=bc(crumbs)+'<div class="doc-list">';
    docs.forEach(function(d){h+=docRow(d);});
    main.innerHTML=h+'</div>';
    main.querySelectorAll('.bc-btn').forEach(attachBc);
    setTimeout(notifyHeight,100);
  }

  function renderFlat(main){
    var docs=D.docs.filter(function(d){
      if(D.filter==='tous')return true;
      if(D.view==='auteur')return(d.authors||[]).indexOf(D.filter)!==-1;
      return d.subject===D.filter;
    });
    if(!docs.length){main.innerHTML='<div class="pa-state">Aucun document pour cette sélection.</div>';return;}
    var h='<div class="doc-list">';docs.forEach(function(d){h+=docRow(d);});
    main.innerHTML=h+'</div>';setTimeout(notifyHeight,100);
  }

  function bc(crumbs){
    var h='<div class="breadcrumb">';
    crumbs.forEach(function(c,i){
      if(i<crumbs.length-1)h+='<button class="bc-btn" data-target="'+(c.target||'home')+'">'+esc(c.label)+'</button><span class="bc-sep">›</span>';
      else h+='<span class="bc-current">'+esc(c.label)+'</span>';
    });
    return h+'</div>';
  }

  function attachBc(btn){
    btn.addEventListener('click',function(){D.level=this.dataset.target;render();setTimeout(notifyHeight,100);});
  }

  function docRow(doc){
    var meta=[doc.author_display,doc.publication,doc.year].filter(Boolean).join(' · ');
    var dlCount=D.counts&&D.counts.downloads&&doc.id?(D.counts.downloads[doc.id]||0):0;
    var dlCountHtml=dlCount>0?'<span class="doc-dl-count">⬇ '+dlCount+'</span>':'';
    var dl=doc.dropbox_url
      ?'<a class="doc-dl" href="'+esc(doc.dropbox_url)+'" target="_blank" onclick="event.stopPropagation();trackDl('+JSON.stringify(doc.id)+')">⬇ Télécharger</a>'
      :'<span class="doc-dl-soon">bientôt</span>';
    return'<div class="doc-row"><div class="doc-icon">📄</div>'+
      '<div class="doc-body"><div class="doc-title">'+esc(doc.title)+'</div>'+
      (meta?'<div class="doc-meta">'+esc(meta)+'</div>':'')+
      '</div>'+dlCountHtml+dl+'</div>';
  }

  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
})();
</script>

<button id="btn-top" title="Retour en haut" aria-label="Retour en haut">↑</button>
<script>
(function(){
  var btn=document.getElementById('btn-top');
  function onScroll(){btn.classList.toggle('visible',(window.scrollY||document.documentElement.scrollTop||0)>150);}
  window.addEventListener('scroll',onScroll,{passive:true});
  document.addEventListener('scroll',onScroll,{passive:true});
  btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
})();

function trackDl(id){
  fetch('/.netlify/functions/track-count',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'download',id:id})
  }).then(function(r){return r.json();}).then(function(d){
    if(!D.counts) D.counts={downloads:{},plays:{},totals:{downloads:0,plays:0}};
    D.counts.downloads[id]=d.count||0;
    D.counts.totals.downloads=d.total||0;
    // Mettre à jour le badge du bandeau immédiatement
    var statEl=document.getElementById('docs-stat');
    var cntEl=document.getElementById('docs-count');
    if(cntEl&&d.total>0){
      cntEl.textContent=d.total.toLocaleString('fr-FR');
      if(statEl) statEl.style.display='inline-flex';
    }
    render(); // Rafraîchir le compteur du document dans la liste
  }).catch(function(){});
}
